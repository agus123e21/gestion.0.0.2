<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Logistica</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }

        header { background: #1e293b; padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #334155; }
        header h1 { font-size: 1.4rem; color: #38bdf8; }
        header span { color: #64748b; font-size: 0.85rem; }

        .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem; }

        .kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .kpi { background: #1e293b; border-radius: 10px; padding: 1.2rem; border: 1px solid #334155; }
        .kpi h3 { font-size: 0.8rem; color: #64748b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
        .kpi .valor { font-size: 2rem; font-weight: 700; }
        .kpi.total .valor { color: #38bdf8; }
        .kpi.pendiente .valor { color: #fbbf24; }
        .kpi.transito .valor { color: #a78bfa; }
        .kpi.entregado .valor { color: #34d399; }

        .secciones { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        @media (max-width: 768px) { .secciones { grid-template-columns: 1fr; } }

        .panel { background: #1e293b; border-radius: 10px; padding: 1.5rem; border: 1px solid #334155; }
        .panel h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 1rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }

        form { display: flex; flex-direction: column; gap: 0.8rem; }
        form label { font-size: 0.8rem; color: #64748b; }
        form input, form select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 0.6rem; border-radius: 6px; font-size: 0.9rem; }
        form input:focus, form select:focus { outline: none; border-color: #38bdf8; }
        form button { background: #38bdf8; color: #0f172a; border: none; padding: 0.7rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
        form button:hover { background: #7dd3fc; }

        .grafico { display: flex; align-items: flex-end; gap: 0.8rem; height: 160px; padding-top: 1rem; }
        .barra-container { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 0.3rem; }
        .barra { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.5s ease; min-height: 4px; }
        .barra-label { font-size: 0.7rem; color: #64748b; }
        .barra-valor { font-size: 0.75rem; font-weight: 600; }

        table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
        th { text-align: left; font-size: 0.75rem; color: #64748b; text-transform: uppercase; padding: 0.6rem; border-bottom: 1px solid #334155; }
        td { padding: 0.6rem; font-size: 0.85rem; border-bottom: 1px solid #1e293b; }
        tr:hover td { background: #334155; }

        .badge { padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-pendiente { background: #78350f; color: #fbbf24; }
        .badge-transito { background: #4c1d95; color: #a78bfa; }
        .badge-entregado { background: #064e3b; color: #34d399; }

        .acciones { display: flex; gap: 0.4rem; }
        .btn-sm { background: #334155; border: none; color: #94a3b8; padding: 0.3rem 0.5rem; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-sm:hover { background: #475569; color: #e2e8f0; }
        .btn-sm.eliminar:hover { background: #991b1b; color: #fca5a5; }

        .table-wrapper { max-height: 320px; overflow-y: auto; }
        .table-wrapper::-webkit-scrollbar { width: 6px; }
        .table-wrapper::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

        .mapa-placeholder { width: 100%; height: 160px; background: #0f172a; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #475569; font-size: 0.85rem; border: 1px dashed #334155; position: relative; overflow: hidden; }
        .mapa-placeholder::before { content: ''; position: absolute; width: 200%; height: 1px; background: #334155; top: 50%; transform: rotate(15deg); }
        .mapa-placeholder::after { content: ''; position: absolute; width: 1px; height: 200%; background: #334155; left: 50%; transform: rotate(25deg); }

        .ruta { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
        .ruta:last-child { border-bottom: none; }
        .ruta-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .ruta-destino { color: #94a3b8; flex: 1; }
        .ruta-fecha { color: #475569; font-size: 0.75rem; }

        footer { text-align: center; padding: 2rem; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1>Control de Logistica</h1>
        <span id="fecha-actual"></span>
    </header>

    <div class="container">
        <div class="kpis">
            <div class="kpi total">
                <h3>Total Envios</h3>
                <div class="valor" id="kpi-total">0</div>
            </div>
            <div class="kpi pendiente">
                <h3>Pendientes</h3>
                <div class="valor" id="kpi-pendiente">0</div>
            </div>
            <div class="kpi transito">
                <h3>En Transito</h3>
                <div class="valor" id="kpi-transito">0</div>
            </div>
            <div class="kpi entregado">
                <h3>Entregados</h3>
                <div class="valor" id="kpi-entregado">0</div>
            </div>
        </div>

        <div class="secciones">
            <div class="panel">
                <h2>Nuevo Envio</h2>
                <form id="form-envio">
                    <label>Destino</label>
                    <input type="text" id="destino" placeholder="Ciudad de destino" required>
                    <label>Producto</label>
                    <input type="text" id="producto" placeholder="Nombre del producto" required>
                    <label>Cantidad</label>
                    <input type="number" id="cantidad" placeholder="Unidades" min="1" required>
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" placeholder="Peso en kg" min="0.1" step="0.1" required>
                    <label>Estado</label>
                    <select id="estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Transito">En Transito</option>
                        <option value="Entregado">Entregado</option>
                    </select>
                    <button type="submit">Agregar Envio</button>
                </form>
            </div>

            <div class="panel">
                <h2>Volumen por Estado</h2>
                <div class="grafico" id="grafico-barras"></div>
            </div>

            <div class="panel">
                <h2>Rutas Activas</h2>
                <div id="lista-rutas"></div>
            </div>

            <div class="panel">
                <h2>Mapa de Operaciones</h2>
                <div class="mapa-placeholder">Mapa no disponible</div>
            </div>
        </div>

        <div class="panel" style="margin-top: 1.5rem;">
            <h2>Registro de Envios</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Destino</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Peso</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-envios"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>Sistema de Control Logistico v1.0</footer>

    <script>
        let envios = JSON.parse(localStorage.getItem('envios')) || [];
        let contadorId = parseInt(localStorage.getItem('contadorId')) || 1;

        function guardar() {
            localStorage.setItem('envios', JSON.stringify(envios));
            localStorage.setItem('contadorId', contadorId);
        }

        function fechaActual() {
            const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return new Date().toLocaleDateString('es-ES', opciones);
        }

        function actualizarKPIs() {
            const total = envios.length;
            const pendientes = envios.filter(e => e.estado === 'Pendiente').length;
            const transito = envios.filter(e => e.estado === 'En Transito').length;
            const entregados = envios.filter(e => e.estado === 'Entregado').length;

            document.getElementById('kpi-total').textContent = total;
            document.getElementById('kpi-pendiente').textContent = pendientes;
            document.getElementById('kpi-transito').textContent = transito;
            document.getElementById('kpi-entregado').textContent = entregados;
        }

        function claseBadge(estado) {
            if (estado === 'Pendiente') return 'badge-pendiente';
            if (estado === 'En Transito') return 'badge-transito';
            return 'badge-entregado';
        }

        function renderTabla() {
            const tbody = document.getElementById('tabla-envios');
            if (envios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:#475569;padding:2rem;">No hay envios registrados</td></tr>';
                return;
            }
            tbody.innerHTML = envios.map(e => `
                <tr>
                    <td>#${String(e.id).padStart(4, '0')}</td>
                    <td>${e.destino}</td>
                    <td>${e.producto}</td>
                    <td>${e.cantidad}</td>
                    <td>${e.peso} kg</td>
                    <td><span class="badge ${claseBadge(e.estado)}">${e.estado}</span></td>
                    <td class="acciones">
                        <button class="btn-sm" onclick="cambiarEstado(${e.id})">Cambiar</button>
                        <button class="btn-sm eliminar" onclick="eliminarEnvio(${e.id})">X</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderGrafico() {
            const contenedor = document.getElementById('grafico-barras');
            const pendientes = envios.filter(e => e.estado === 'Pendiente').length;
            const transito = envios.filter(e => e.estado === 'En Transito').length;
            const entregados = envios.filter(e => e.estado === 'Entregado').length;
            const maximo = Math.max(pendientes, transito, entregados, 1);

            const barras = [
                { label: 'Pendiente', valor: pendientes, color: '#fbbf24' },
                { label: 'Transito', valor: transito, color: '#a78bfa' },
                { label: 'Entregado', valor: entregados, color: '#34d399' },
            ];

            contenedor.innerHTML = barras.map(b => `
                <div class="barra-container">
                    <div class="barra-valor" style="color:${b.color}">${b.valor}</div>
                    <div class="barra" style="height:${(b.valor / maximo) * 120}px;background:${b.color}"></div>
                    <div class="barra-label">${b.label}</div>
                </div>
            `).join('');
        }

        function renderRutas() {
            const contenedor = document.getElementById('lista-rutas');
            const activos = envios.filter(e => e.estado === 'En Transito');
            if (activos.length === 0) {
                contenedor.innerHTML = '<div style="color:#475569;font-size:0.85rem;padding:1rem 0;">Sin rutas activas</div>';
                return;
            }
            contenedor.innerHTML = activos.slice(0, 5).map(e => `
                <div class="ruta">
                    <div class="ruta-dot" style="background:#a78bfa"></div>
                    <span class="ruta-destino">${e.destino}</span>
                    <span class="ruta-fecha">${e.producto}</span>
                </div>
            `).join('');
        }

        function render() {
            actualizarKPIs();
            renderTabla();
            renderGrafico();
            renderRutas();
        }

        document.getElementById('form-envio').addEventListener('submit', function(e) {
            e.preventDefault();
            const envio = {
                id: contadorId++,
                destino: document.getElementById('destino').value.trim(),
                producto: document.getElementById('producto').value.trim(),
                cantidad: parseInt(document.getElementById('cantidad').value),
                peso: parseFloat(document.getElementById('peso').value),
                estado: document.getElementById('estado').value,
            };
            envios.push(envio);
            guardar();
            render();
            this.reset();
        });

        function cambiarEstado(id) {
            const envio = envios.find(e => e.id === id);
            if (!envio) return;
            const estados = ['Pendiente', 'En Transito', 'Entregado'];
            const idx = estados.indexOf(envio.estado);
            envio.estado = estados[(idx + 1) % estados.length];
            guardar();
            render();
        }

        function eliminarEnvio(id) {
            envios = envios.filter(e => e.id !== id);
            guardar();
            render();
        }

        document.getElementById('fecha-actual').textContent = fechaActual();
        render();
    </script>
</body>
</html>
