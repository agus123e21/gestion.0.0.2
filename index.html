<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Logistica</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <header>
        <h1>Control de Logistica</h1>
        <span id="fecha-actual"></span>
    </header>

    <div class="container">
        <div class="kpis">
            <div class="kpi total">
                <h3>Total Envios</h3>
                <div class="valor" id="kpi-total">0</div>
            </div>
            <div class="kpi pendiente">
                <h3>Pendientes</h3>
                <div class="valor" id="kpi-pendiente">0</div>
            </div>
            <div class="kpi transito">
                <h3>En Transito</h3>
                <div class="valor" id="kpi-transito">0</div>
            </div>
            <div class="kpi entregado">
                <h3>Entregados</h3>
                <div class="valor" id="kpi-entregado">0</div>
            </div>
        </div>

        <div class="secciones">
            <div class="panel">
                <h2>Nuevo Envio</h2>
                <form id="form-envio">
                    <label>Origen</label>
                    <input type="text" id="origen" placeholder="Ciudad de origen" required>
                    <label>Destino</label>
                    <input type="text" id="destino" placeholder="Ciudad de destino" required>
                    <label>Producto</label>
                    <input type="text" id="producto" placeholder="Nombre del producto" required>
                    <label>Cantidad</label>
                    <input type="number" id="cantidad" placeholder="Unidades" min="1" required>
                    <label>Peso (kg)</label>
                    <input type="number" id="peso" placeholder="Peso en kg" min="0.1" step="0.1" required>
                    <label>Estado</label>
                    <select id="estado">
                        <option value="Pendiente">Pendiente</option>
                        <option value="En Transito">En Transito</option>
                        <option value="Entregado">Entregado</option>
                    </select>
                    <button type="submit">Agregar Envio</button>
                </form>
            </div>

            <div class="panel">
                <h2>Volumen por Estado</h2>
                <div class="grafico" id="grafico-barras"></div>
            </div>

            <div class="panel">
                <h2>Rutas Activas</h2>
                <div id="lista-rutas"></div>
            </div>

            <div class="panel panel-mapa">
                <h2>Mapa de Operaciones</h2>
                <div id="mapa" class="mapa-real"></div>
            </div>
        </div>

        <div class="panel" style="margin-top: 1.5rem;">
            <h2>Registro de Envios</h2>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Origen</th>
                            <th>Destino</th>
                            <th>Distancia</th>
                            <th>Producto</th>
                            <th>Cantidad</th>
                            <th>Peso</th>
                            <th>Estado</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-envios"></tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>Sistema de Control Logistico v1.0</footer>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
